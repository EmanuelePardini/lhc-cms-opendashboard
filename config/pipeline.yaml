ingestion:
  cache_dir: "data/cache"
  max_rows: null 

cuts:
  # Transverse momentum minimum [GeV/c]
  pt_min_gev: 3.0

  # Pseudorapidity acceptance window |η| < eta_max
  eta_max: 2.4

  # Invariant mass window [GeV/c²] for Z boson candidate tagging
  z_window_low_gev: 76.0
  z_window_high_gev: 106.0

  # Minimum ΔR angular separation between the two muons
  delta_r_min: 0.3

storage:
  db_path: "data/processed/events.db"